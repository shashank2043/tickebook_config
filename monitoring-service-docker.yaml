eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    export:
      zipkin:
        endpoint: http://zipkin:9411/api/v2/spans
    sampling:
      probability: 1.0   # trace all requests
    propagation:
      type: B3
server:
  port: 9090
logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"