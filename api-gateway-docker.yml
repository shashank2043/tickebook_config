server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - http://localhost:8080
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true
          routes:

            - id: movie-service
              uri: lb://MOVIE-SERVICE
              predicates:
                - Path=/api/movies/**

            - id: consumer-service
              uri: lb://CONSUMER-SERVICE
              predicates:
                - Path=/api/bookings/**,/api/booking-seats/**,/api/tickets/**

            - id: show-service
              uri: lb://SHOW-SERVICE
              predicates:
                - Path=/api/shows/**

            - id: theatre-service
              uri: lb://THEATRE-SERVICE
              predicates:
                - Path=/api/screens/**,/api/seats/**,/api/theatres/**,/api/owner/**

            - id: admin-service
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/api/theatre-approval-requests/**,/api/role-approval-requests/**

            - id: auth-service-public
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth/**,/api/user/**

            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/payments/**

            - id: monitoring-service
              uri: lb://management-service
              predicates:
                - Path=/metrics/**
              filters:
                - StripPrefix=1

            - id: auth-service-swagger
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/auth-service-swagger/**
              filters:
                - RewritePath=/auth-service-swagger/(?<segment>.*), /${segment}

            - id: admin-service-swagger
              uri: lb://ADMIN-SERVICE
              predicates:
                - Path=/swagger/admin-service/**
              filters:
                - RewritePath=/swagger/admin-service/(?<segment>.*), /${segment}

            - id: consumer-service-swagger
              uri: lb://CONSUMER-SERVICE
              predicates:
                - Path=/swagger/consumer-service/**
              filters:
                - RewritePath=/swagger/consumer-service/(?<segment>.*), /${segment}

            - id: movie-service-swagger
              uri: lb://MOVIE-SERVICE
              predicates:
                - Path=/swagger/movie-service/**
              filters:
                - RewritePath=/swagger/movie-service/(?<segment>.*), /${segment}

            - id: show-service-swagger
              uri: lb://SHOW-SERVICE
              predicates:
                - Path=/swagger/show-service/**
              filters:
                - RewritePath=/swagger/show-service/(?<segment>.*), /${segment}
            - id: theatre-service-swagger
              uri: lb://THEATRE-SERVICE
              predicates:
                - Path=/swagger/theatre-service/**
              filters:
                - RewritePath=/swagger/theatre-service/(?<segment>.*), /${segment}
springdoc:
  swagger-ui:
    urls:
      - name: auth-service
        url: /auth-service-swagger/v3/api-docs
      - name: admin-service
        url: /swagger/admin-service/v3/api-docs
      - name: consumer-service
        url: /swagger/consumer-service/v3/api-docs
      - name: movie-service
        url: /swagger/movie-service/v3/api-docs
      - name: show-service
        url: /swagger/show-service/v3/api-docs
      - name: theatre-service
        url: /swagger/theatre-service/v3/api-docs
    config-url: /v3/api-docs/swagger-config
  api-docs:
    enabled: true
eureka:
  client:
    registry-fetch-interval-seconds: 5
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/

jwt:
  secret: tickebook_auth_jwt_super_secure_secret_2026_value
