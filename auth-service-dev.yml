server:
  port: 0
spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
      micrometer:
        enabled: true
  main:
    lazy-initialization: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    password: Shashank@123
    url: jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true
    username: shashank
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 2000
        delivery.timeout.ms: 5000
        request.timeout.ms: 3000
    properties:
      # Slow down reconnection attempts
      reconnect.backoff.ms: 5000
      reconnect.backoff.max.ms: 30000
      retry.backoff.ms: 5000

      # Reduce metadata refresh spam
      metadata.max.age.ms: 600000
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
#  instance:
#    prefer-ip-address: true
jwt:
  secret: tickebook_auth_jwt_super_secure_secret_2026_value
default:
  admin:
    email: admin@tickebook.com
    password: admin123
logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.team11.tickebook: DEBUG   # your base package
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always
  tracing:
    export:
      zipkin:
        endpoint: http://localhost:9411/api/v2/spans
    sampling:
      probability: 1.0   # trace all requests
    propagation:
      type: B3