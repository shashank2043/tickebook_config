server:
  port: 8080
spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  main:
    lazy-initialization: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    password: Shashank@123
    url: jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true
    username: shashank
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: kafka:9092
    admin:
      auto-create: true
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false
        max.block.ms: 60000
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000
    properties:
      # Slow down reconnection attempts
      reconnect.backoff.ms: 5000
      reconnect.backoff.max.ms: 30000
      retry.backoff.ms: 5000

      # Reduce metadata refresh spam
      metadata.max.age.ms: 600000
eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
#  instance:
#    prefer-ip-address: true
jwt:
  secret: tickebook_auth_jwt_super_secure_secret_2026_value

logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.team11.tickebook: DEBUG   # your base package
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level ${spring.application.name:-auth-service} [%X{traceId}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level ${spring.application.name:-auth-service} [%X{traceId}] %logger - %msg%n"
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always