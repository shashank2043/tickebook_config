spring:
  cloud:
    openfeign:
      micrometer:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: B3

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId},%X{spanId}]"
